services:
  node:
    container_name: app-helpme
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      # Tudo que alterar na máquina será refletido no container
      - .:/app
      # Evita sobrescrever o node_modules do container
      - node_modules:/app/node_modules
    ports:
      - "3333:3333"
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      DATABASE_URL: postgres://docker:docker@postgres:5432/helpme
    depends_on:
      - postgres
    # command: npm run dev
    # command: > 
      # sh -c "npx prisma migrate deploy && npm run dev"
    # migrate dev → desenvolvimento, cria novas migrations.
    # migrate deploy → produção, apenas aplica migrations já existentes.
    command: > 
      sh -c "npx prisma migrate dev && npm run dev"

  postgres:
    container_name: postgres-helpme
    image: bitnami/postgresql:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: helpme
    ports:
      - "5432:5432"
    volumes:
      - postgresql_data:/bitnami/postgresql

  adminer:
    container_name: adminer-helpme
    image: adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  postgresql_data:
  node_modules: